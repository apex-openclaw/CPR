# LlamaFactory configuration for Qwen 3.5 4B SFT on CPR
stage: sft
model_name_or_path: Qwen/Qwen3-4B
template: qwen3_nothink
finetuning_type: lora
deepspeed: configs/ds_z2_config.json
output_dir: outputs/qwen35-cpr-lora-finalanswer-nothink
seed: 42

dataset: cpr_train
dataset_dir: data/prepared
eval_dataset: cpr_val
cutoff_len: 16384
max_samples: null
val_size: 0

do_train: true
do_eval: true
do_predict: false
bf16: true
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
per_device_eval_batch_size: 1
learning_rate: 1.0e-4
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.01
logging_steps: 10
save_strategy: steps
save_steps: 250
eval_strategy: steps
eval_steps: 500
report_to:
  - wandb

lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
additional_target: null

preprocessing_num_workers: 16
dataloader_num_workers: 16
flash_attn: fa2
ddp_timeout: 180000000
