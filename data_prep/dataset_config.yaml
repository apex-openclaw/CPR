# Edit these paths to point to your local cpg0012 assets.
data_root: "/mnt/ceph_rbd"
paths:
  labels_csv: "{data_root}/cellpainting_data/cpg0012/labels/compound_assay_activity_with_smiles.csv"
  features_dir: "{data_root}/cellpainting_data/cpg0012/cell_profiler_features/CDRP"
  plate_well_map: "{data_root}/cellpainting_data/cpg0012/mae_plate_well_inchikey_smiles.csv"
  train_split_csv: "{data_root}/cellpainting_data/cpg0012/splits/splits/datasplit1-train.csv"
  val_split_csv: "{data_root}/cellpainting_data/cpg0012/splits/splits/datasplit1-val.csv"
  test_split_csv: "{data_root}/cellpainting_data/cpg0012/splits/splits/datasplit1-test.csv"
  assay_desc_json: "{project_root}/reference/assay_descriptions.json"
  traces_dir: "{project_root}/reference/traces"  # optional curated responses
output:
  dir: "data/prepared"
  train_file: "train.jsonl"
  val_file: "val.jsonl"
  test_file: "test.jsonl"
  metadata_file: "metadata.csv"
prompt:
  top_k_features: -1           # <=0 means include all morphological features
  max_prompt_tokens: 6000
  include_assays: []          # leave empty to use all assays
  min_labeled: 20
  min_pos_ratio: 0.05
  max_pos_ratio: 0.95
  per_assay_limit: null
  template_name: "default"
  add_structural_hint: true
  require_description: true
reasoning:
  use_curated_traces: true     # if traces_dir contains DeepSeek traces
  fallback_style: "label_only"  # template | label_only
